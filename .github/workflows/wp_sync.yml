name: WordPress Sync

# Only new articles (no wp_id in frontmatter) are ever pushed to WordPress.
# Existing articles stay untouched in WordPress.
on:
  # Publish new Markdown articles when committed to main/master
  push:
    branches: [main, master]
    paths:
      - "articles/**"

  # Manual trigger for status checks or one-off pushes
  workflow_dispatch:
    inputs:
      direction:
        description: "Command to run"
        required: true
        default: "push"
        type: choice
        options:
          - "push"
          - "push --all"
          - "status"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Resolve command ────────────────────────────────────────────────────
      - name: Resolve command
        id: opts
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "cmd=${{ inputs.direction }}" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=push"                    >> "$GITHUB_OUTPUT"
          fi

      # ── Run the sync script ────────────────────────────────────────────────
      - name: Run wp_sync
        env:
          WP_URL:          ${{ secrets.WP_URL }}
          WP_USER:         ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python scripts/wp_sync.py ${{ steps.opts.outputs.cmd }}
